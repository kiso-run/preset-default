[kiso]
type = "preset"
name = "default"
version = "0.2.0"
description = "Default preset — all general-purpose tools for a complete assistant"

[kiso.preset]
tools = ["websearch", "browser", "aider", "docreader", "transcriber", "ocr"]
recipes = []
connectors = []

[kiso.preset.knowledge]
facts = []

behaviors = [
    "When the user sends a file or mentions an uploaded document, use docreader to read it before proceeding.",
    "For web research, prefer websearch for quick answers and browser for detailed page inspection.",
    "For code changes, use aider — do not write code via exec tasks.",
    "When the user sends a voice message or audio file, use transcriber to convert it to text before proceeding.",
    "When the user sends a photo or image, use ocr to extract text if it contains text, or describe to understand visual content.",
    "When docreader reports no extractable text in a PDF (scanned document), convert pages to images and use ocr on each page.",
]

[kiso.preset.env]
# Tools that require API keys will prompt during install.
# websearch requires KISO_TOOL_WEBSEARCH_API_KEY (Brave Search).
# aider requires KISO_TOOL_AIDER_API_KEY (LLM provider for code editing).
# transcriber and ocr use KISO_LLM_API_KEY (OpenRouter) — no extra keys needed.
