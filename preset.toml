[kiso]
type = "preset"
name = "default"
version = "0.4.0"
description = "Default persona preset — knowledge facts and behaviours that pair with the kiso/core default MCP preset."

[kiso.preset]
# v0.4.0 (2026-04-25): the wrapper / recipe / connector subsystems
# were retired in kiso/core Phase 4 (M1504, M1502). MCP servers and
# skills are now managed separately (`kiso/presets/default.mcp.json`
# + skill installs). What lives here is purely the persona layer:
# default behaviours and any seeded knowledge facts.

[kiso.preset.knowledge]
facts = []

behaviors = [
    "When the user attaches a file (audio, image, document), use the message-attachment-receiver skill flow: read it through the right MCP, then re-plan with the extracted text as the user's actual message.",
    "For code changes, call the kiso-aider MCP — never write code via exec heredocs.",
    "When kiso-docreader returns no extractable text from a PDF (scanned document), fall back to kiso-ocr on the rendered pages.",
    "Prefer kiso-search (web search via Sonar) for any external information lookup; do not improvise via curl/wget.",
]
